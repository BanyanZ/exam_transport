<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>智慧交通期末复习</title>
    <meta name="description" content="地理信息系统、运筹学、交通大数据技术、车联网技术、毛概期末复习资料。">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="#top" aria-label="智慧交通期末复习">
          <img class="seal-mark" src="assets/sysu-emblem.png" alt="" aria-hidden="true">
          <span>
            <strong>智慧交通期末复习</strong>
            <small>复习入口</small>
          </span>
        </a>
        <span class="author-badge">作者：BanyanZ</span>
        <button class="icon-button" id="themeToggle" type="button" aria-label="切换主题" title="切换主题">
          <span class="sun" aria-hidden="true"></span>
        </button>
      </header>

      <main id="top">
        <section class="hero">
          <div class="hero-copy">
            <p class="eyebrow">中山大学期末复习</p>
            <h1>是否还找不到合适的资料？</h1>
            <p class="lead">
              下面这些资料是我根据课程PPT总结的，总结和试卷是大模型制作，希望能帮助减轻复习压力。
            </p>
                    </div>
          <div class="hero-visual">
            <img class="hero-emblem" src="assets/sysu-emblem.png" alt="中山大学校徽">
          </div>
        </section>

        <span class="section-anchor" id="resources" aria-hidden="true"></span>
        <section class="course-section" id="courses">
          <div class="section-heading">
            <p class="eyebrow">课程分区</p>
          </div>
          <div class="course-grid" id="courseGrid"></div>
        </section>
      </main>
    </div>

    <dialog class="course-drawer" id="courseDrawer">
      <div class="showcase-shell">
        <div class="showcase-top">
          <div>
            <small id="courseDrawerMeta">课程资料</small>
            <h3 id="courseDrawerTitle">课程资料</h3>
          </div>
          <button class="icon-button" type="button" id="closeCourseDrawer" aria-label="关闭课程资料" title="关闭课程资料">
            <span class="close-icon" aria-hidden="true"></span>
          </button>
        </div>
        <div class="showcase-stats" id="courseDrawerStats"></div>
        <div class="resource-canvas-grid course-drawer-grid" id="courseDrawerGrid"></div>
      </div>
    </dialog>

    <dialog class="preview-dialog" id="previewDialog">
      <div class="dialog-top">
        <div>
          <small id="previewCourse"></small>
          <h3 id="previewTitle">资料预览</h3>
        </div>
        <button class="icon-button" type="button" id="closePreview" aria-label="关闭预览" title="关闭预览">
          <span class="close-icon" aria-hidden="true"></span>
        </button>
      </div>
      <div class="preview-body" id="previewBody" aria-live="polite">
        <div class="preview-message">正在准备预览</div>
      </div>
      <div class="dialog-actions">
        <a id="openPreview" href="#" target="_blank" rel="noreferrer">新窗口打开</a>
        <a id="downloadPreview" href="#" download>下载资料</a>
        <button type="button" id="copyPath">复制路径</button>
      </div>
    </dialog>

    <dialog class="showcase-drawer" id="showcaseDrawer">
      <div class="showcase-shell">
        <div class="showcase-top">
          <div>
            <small id="showcaseMeta">资料展示柜</small>
            <h3 id="showcaseTitle">资料展示柜</h3>
          </div>
          <button class="icon-button" type="button" id="closeShowcase" aria-label="关闭展示柜" title="关闭展示柜">
            <span class="close-icon" aria-hidden="true"></span>
          </button>
        </div>
        <div class="showcase-stats" id="showcaseStats"></div>
        <div class="showcase-grid" id="showcaseGrid"></div>
        <p class="empty-state showcase-empty" id="showcaseEmpty" hidden>这个展示柜里暂时没有匹配资料。</p>
      </div>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="app.js"></script>
  </body>
</html>
